<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasil Pencarian | kerja.in</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
</head>
<body>
    <nav class="nav-kerjain">
        <a href="index.html" class="logo">kerja<span>.in</span></a>
    </nav>

    <div class="result-container">
        <div class="result-header">
            <h2 id="judul-hasil">Mencari Tukang...</h2>
            <p id="sub-judul">Lokasi: <span id="txt-lokasi">-</span></p>
        </div>

        <div class="grid-tukang" id="daftar-tukang">
            </div>
    </div>

    <script>
        // 1. Ambil data dari URL
        const params = new URLSearchParams(window.location.search);
        const kat = params.get('kategori');
        const lok = params.get('lokasi');

        document.getElementById('txt-lokasi').innerText = lok.charAt(0).toUpperCase() + lok.slice(1);
        document.getElementById('judul-hasil').innerText = `Hasil Jasa ${kat === 'elektronik' ? 'Service Elektronik' : kat === 'perbaikan' ? 'Perbaikan Rumah' : 'Kebersihan'}`;

        // 2. Data Fiktif
        const dataTukang = [
            { nama: "Bpk. Ahmad Suherman", kat: "kebersihan", foto: "kangbersih.jpg", sertif: "Sertifikasi BNSP Kebersihan Gedung", rate: "4.9", desk: "Spesialis pembersihan detail & e-waste." },
            { nama: "Bpk. Jaka Kelana", kat: "perbaikan", foto: "kangcat.jpg", sertif: "Sertifikasi Konstruksi Sipil", rate: "4.8", desk: "Ahli cat tembok & perbaikan struktur rumah." },
            { nama: "Bpk. Rian Hidayat", kat: "elektronik", foto: "kangmesincuci.jpg", sertif: "Teknisi Elektronik Berlisensi", rate: "5.0", desk: "Service mesin cuci & alat rumah tangga lainnya." }
        ];

        // 3. Filter dan Tampilkan
        const container = document.getElementById('daftar-tukang');
        const hasilFilter = dataTukang.filter(t => t.kat === kat);

        if(hasilFilter.length > 0) {
            hasilFilter.forEach(t => {
                container.innerHTML += `
                    <div class="card-tukang">
                        <div class="img-wrapper"><img src="${t.foto}" alt="Tukang"></div>
                        <div class="info-tukang">
                            <span class="tag-sertifikasi"><i class="fas fa-certificate"></i> ${t.sertif}</span>
                            <div class="nama-tukang">${t.nama}</div>
                            <div class="detail-item"><i class="fas fa-map-marker-alt"></i> Area: ${lok.toUpperCase()}</div>
                            <div class="detail-item rating"><i class="fas fa-star"></i> ${t.rate} (Review AI)</div>
                            <p class="detail-item">${t.desk}</p>
                            <button class="btn-order">Pesan Sekarang</button>
                        </div>
                    </div>
                `;
            });
        } else {
            container.innerHTML = "<p>Maaf, tukang di kategori ini belum tersedia di kota Anda.</p>";
        }
    </script>
</body>
</html>
