<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun | kerja.in</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        }

        .register-card {
            background: var(--putih);
            width: 100%;
            max-width: 500px; /* Sedikit lebih lebar dari login */
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(15, 23, 42, 0.1);
        }

        .register-card h2 {
            text-align: center;
            color: var(--biru-donker);
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .register-card p {
            text-align: center;
            color: var(--abu-abu-dark);
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--biru-donker);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: var(--biru-muda);
        }

        .input-wrapper input, .input-wrapper select {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .input-wrapper input:focus {
            border-color: var(--biru-muda);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background-color: var(--biru-muda);
            color: var(--biru-donker);
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-register:hover {
            background-color: var(--biru-donker);
            color: var(--putih);
            transform: translateY(-2px);
        }

        .register-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--abu-abu-dark);
        }

        .register-footer a {
            color: var(--biru-muda);
            text-decoration: none;
            font-weight: 600;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--abu-abu-dark);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--biru-donker); }

        /* Responsif untuk layar kecil */
        @media (max-width: 480px) {
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="register-card">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Beranda</a>
            
            <div style="text-align: center; margin-bottom: 20px;">
                <span style="font-size: 1.8rem; font-weight: 800; color: var(--biru-donker);">kerja<span style="color: var(--biru-muda);">.in</span></span>
            </div>

            <h2>Buat Akun Baru</h2>
            <p>Bergabunglah dengan komunitas jasa terpercaya</p>

            <form>
                <div class="form-row">
                    <div class="form-group">
                        <label>Nama Depan</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" placeholder="Nama Depan" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Nama Belakang</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" placeholder="Nama Belakang" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Nomor WhatsApp</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" placeholder="0812xxxx" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="email@kerja.in" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Daftar Sebagai</label>
                    <div class="input-wrapper">
                        <i class="fas fa-briefcase"></i>
                        <select required style="appearance: none;">
                            <option value="user">Pelanggan (Cari Jasa)</option>
                            <option value="mitra">Mitra Tukang (Buka Jasa)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Kata Sandi</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Minimal 8 karakter" required>
                    </div>
                </div>

                <button type="submit" class="btn-register">Daftar Sekarang</button>
            </form>

            <div class="register-footer">
                Sudah punya akun? <a href="masuk.html">Masuk di sini</a>
            </div>
        </div>
    </div>

</body>
</html>
