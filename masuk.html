<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk | kerja.in</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>
            
            <div class="text-center mb-4" style="text-align: center;">
                <a href="#" class="logo" style="text-decoration: none; font-size: 2rem; font-weight: 800; color: var(--biru-donker);">
                    kerja<span style="color: var(--biru-muda);">.in</span>
                </a>
            </div>

            <h2>Selamat Datang</h2>
            <p>Masuk untuk mengelola pesanan jasa Anda</p>

            <form>
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="contoh@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Kata Sandi</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">Masuk Sekarang</button>
            </form>

            <div class="login-footer">
                Belum punya akun? <a href="#">Daftar di sini</a>
            </div>
        </div>
    </div>

</body>
</html>
